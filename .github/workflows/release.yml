name: Build release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to build and publish, for example v0.2.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
            archive: RhythmFlow-windows-x64.zip
          - os: macos-latest
            platform: macos
            archive: RhythmFlow-macos.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Normalize npm metadata
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const packageJsonPath = "package.json";
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, "utf8"));

          packageJson.scripts = {
            prepare: "vp config || vp config --no-hooks",
            build: "vp build",
            check: "vp check",
            test: "vp test",
            dev: "vp dev",
            preview: "vp preview",
            ...packageJson.scripts,
          };

          if (packageJson.devDependencies?.vite === "catalog:") {
            packageJson.devDependencies.vite = "npm:@voidzero-dev/vite-plus-core@0.2.2";
          }

          if (packageJson.devDependencies?.["vite-plus"] === "catalog:") {
            packageJson.devDependencies["vite-plus"] = "0.2.2";
          }

          delete packageJson.devEngines;
          packageJson.packageManager = "npm@11.16.0";

          fs.writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, 2)}\n`);
          fs.writeFileSync(".npmrc", "legacy-peer-deps=true\n");
          fs.rmSync("pnpm-workspace.yaml", { force: true });
          NODE

      - name: Build front-end
        shell: bash
        run: |
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only --ignore-scripts --legacy-peer-deps
          fi
          npm ci --legacy-peer-deps
          npm run build

      - name: Build executable
        run: python -m PyInstaller --noconfirm rhythmflow.spec

      - name: Package Windows build (one-dir exe)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/RhythmFlow/RhythmFlow.exe")) {
            throw "Build output not found: dist/RhythmFlow/RhythmFlow.exe"
          }
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path "dist/RhythmFlow" -DestinationPath "release/${{ matrix.archive }}" -Force

      - name: Package macOS build (.app bundle)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ ! -d "dist/RhythmFlow.app" ]; then
            echo "Build output not found: dist/RhythmFlow.app"
            exit 1
          fi
          mkdir -p release
          ditto -c -k --keepParent "dist/RhythmFlow.app" "release/${{ matrix.archive }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: RhythmFlow-${{ matrix.platform }}
          path: release/${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: ${{ needs.build.result == 'success' && (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')) }}

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: RhythmFlow-*
          path: release-assets
          merge-multiple: true

      - name: Check release assets
        shell: bash
        run: |
          if ! find release-assets -type f -name "*.zip" | grep -q .; then
            echo "No release assets were built successfully."
            exit 1
          fi

      - name: Publish release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
