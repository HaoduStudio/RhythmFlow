name: Build release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
            archive: RhythmFlow-windows-x64.zip
          - os: macos-latest
            platform: macos
            archive: RhythmFlow-macos.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: rhythmflow/webui/frontend/package-lock.json

      - name: Build front-end
        working-directory: rhythmflow/webui/frontend
        run: |
          npm ci
          npm run build

      - name: Build executable
        run: python -m PyInstaller --noconfirm rhythmflow.spec

      - name: Package Windows build (one-dir exe)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/RhythmFlow/RhythmFlow.exe")) {
            throw "Build output not found: dist/RhythmFlow/RhythmFlow.exe"
          }
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path "dist/RhythmFlow" -DestinationPath "release/${{ matrix.archive }}" -Force

      - name: Package macOS build (.app bundle)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ ! -d "dist/RhythmFlow.app" ]; then
            echo "Build output not found: dist/RhythmFlow.app"
            exit 1
          fi
          mkdir -p release
          ditto -c -k --keepParent "dist/RhythmFlow.app" "release/${{ matrix.archive }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: RhythmFlow-${{ matrix.platform }}
          path: release/${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: RhythmFlow-*
          path: release-assets
          merge-multiple: true

      - name: Check release assets
        shell: bash
        run: |
          if ! find release-assets -type f -name "*.zip" | grep -q .; then
            echo "No release assets were built successfully."
            exit 1
          fi

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          name: RhythmFlow ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
